<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Track Your Kritto</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lora&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Lora', serif;
      background: white;
      color: black;
      text-align: center;
      padding: 50px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      margin-bottom: 30px;
    }

    input {
      padding: 10px;
      width: 250px;
      border: 1px solid #d4af37;
      border-radius: 8px;
    }

    button {
      padding: 10px 20px;
      margin-left: 10px;
      border: none;
      background: #d4af37;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    #result {
      margin-top: 30px;
      font-size: 18px;
    }
  </style>
</head>
<body>

  <h1>Track Your Kritto</h1>

  <input type="text" id="trackInput" placeholder="Enter Tracking ID">
  <button onclick="track()">Track</button>

  <div id="result"></div>

  <script type="module" src="track.js"></script>

</body>
</html>
