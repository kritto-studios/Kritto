<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kritto Eid Card</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="card-container">

  <!-- Front Cover -->
  <div class="card-front">
      <h1>Eid Mubarak 🌙</h1>
      <p>Tap to open</p>
  </div>

  <!-- Inside Card -->
  <div class="card-inside">
      <h2 id="toName">Dear Friend,</h2>

      <p class="message">
        May your Eid be filled with light, kindness, and beautiful moments.
      </p>

      <p class="from">
        From <span id="fromName">Someone</span>
      </p>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
