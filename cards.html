<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kritto Cards</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lora:wght@400&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="cards.css">
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">Kritto</div>
  <a href="index.html" class="back">Home</a>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Kritto Cards</h1>
  <p>You imagine it. We craft it — yours alone.</p>
</section>

<!-- FORM SECTION -->
<section class="form-section">

  <form class="card-form">

    <label>Your Name</label>
    <input type="text" name="name" placeholder="Enter your name" required>

    <label>Your Idea</label>
    <textarea name="idea" placeholder="Describe your card idea..." required></textarea>

    <label>Upload Image (optional)</label>
    <input type="file" name="image">

    <label>Delivery Type</label>
    <select name="delivery">
      <option value="Digital">Digital</option>
      <option value="Physical">Physical</option>
    </select>

    <button type="submit">Submit Request</button>

  </form>

  <!-- PAYMENT STEP -->
  <div id="paymentBox"></div>

  <!-- RECEIPT STEP -->
  <div id="receiptBox"></div>

</section>

<!-- JS (VERY IMPORTANT) -->
<script type="module" src="card.js"></script>

</body>
</html>
