<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Kritto Admin</title>

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Lora&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Lora', serif;
      background: #ffffff;
      color: #111;
      padding: 40px;
    }

    h1 {
      font-family: 'Cinzel', serif;
      text-align: center;
      margin-bottom: 40px;
      letter-spacing: 2px;
    }

    .card {
      border: 1px solid #d4af37;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 12px;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    a {
      color: #d4af37;
      text-decoration: none;
    }

    select {
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #d4af37;
      background: white;
      font-family: 'Lora', serif;
    }

    /* STATUS STYLE */
    .status {
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin-left: 5px;
    }

    .status.received { background: #f5f5f5; color: #555; }
    .status.curating { background: #d4af37; color: white; }
    .status.in-composition { background: #111; color: #d4af37; }
    .status.refining { background: #444; color: white; }
    .status.sealed { background: black; color: gold; }
    .status.delivered { background: #000; color: white; }
  </style>
</head>
<body>

  <h1>Kritto Requests</h1>

  <div id="data-container"></div>

  <script type="module" src="admin.js"></script>

</body>
</html>
